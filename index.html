<script>

const API="https://script.google.com/macros/s/AKfycbwYw3hAF-O6qeiDkR9pb10OuwgXc8PrX48ZiRj2KCcrkAaPfFj9dJG4YXesRe4rsUc4/exec"

let roster={}
let log=[]
let currentPitcher=null
let currentButton=null

function todayDateString(){
  const t=new Date()
  return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0")
}

async function load(){
  document.getElementById("date").value=todayDateString()

  const res=await fetch("roster.json")
  roster=await res.json()

  const teamSelect=document.getElementById("team")

  Object.keys(roster).forEach(t=>{
    let opt=document.createElement("option")
    opt.value=t
    opt.text=t
    teamSelect.appendChild(opt)
  })

  teamSelect.onchange=render
  render()
}

function render(){
  const team=document.getElementById("team").value
  const div=document.getElementById("pitchers")

  div.innerHTML=""

  if(!team || team.startsWith("7U")) return

  roster[team].forEach(p=>{
    let btn=document.createElement("button")
    btn.className="player"
    btn.innerHTML=p+'<span class="checkmark"></span>'
    btn.onclick=()=>openPitchModal(p,btn)
    div.appendChild(btn)
  })
}

function openPitchModal(name,btn){
  const index=log.findIndex(l=>l.name===name)

  if(index>=0){
    log.splice(index,1)
    btn.classList.remove("added")
    btn.querySelector(".checkmark").innerText=""
    update()
    return
  }

  currentPitcher=name
  currentButton=btn

  document.getElementById("modalText").innerText="Pitch count for "+name
  document.getElementById("modalInput").value=""
  document.getElementById("pitchModal").style.display="block"
}

function modalCancel(){
  document.getElementById("pitchModal").style.display="none"
}

function modalConfirm(){
  const pitches=Number(document.getElementById("modalInput").value)

  if(isNaN(pitches)||pitches<0){
    alert("Enter valid pitch count")
    return
  }

  log.push({
    name:currentPitcher,
    pitches:pitches,
    restDays:calculateRestDays(pitches)
  })

  currentButton.classList.add("added")
  currentButton.querySelector(".checkmark").innerText="✔"

  update()
  modalCancel()
}

function calculateRestDays(p){
  if(p<=20) return 0
  if(p<=35) return 1
  if(p<=50) return 2
  if(p<=65) return 3
  return 4
}

function update(){
  const div=document.getElementById("log")
  div.innerHTML=""

  log.forEach(l=>{
    div.innerHTML+=`${l.name} — ${l.pitches}
<button class="log-remove-btn" onclick="removeFromLog('${l.name}')">Remove</button><br>`
  })
}

function removeFromLog(name){
  const index=log.findIndex(l=>l.name===name)

  if(index>=0){
    log.splice(index,1)

    document.querySelectorAll(".player").forEach(btn=>{
      if(btn.innerText.includes(name)){
        btn.classList.remove("added")
        btn.querySelector(".checkmark").innerText=""
      }
    })

    update()
  }
}

async function submitGame(){
  const notes=document.getElementById("notes").value.trim()

  if(!notes){
    alert("Please enter Game Notes")
    return
  }

  if(log.length===0){
    alert("No pitchers added")
    return
  }

  const submitBtn=document.getElementById("submitBtn")
  submitBtn.disabled=true
  submitBtn.innerHTML="Submitting <span class='spinner'></span>"

  const data={
    date:document.getElementById("date").value,
    team:document.getElementById("team").value,
    opponent:document.getElementById("opponent").value,
    notes:notes,
    pitchers:log
  }

  try{
    await fetch(API,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify(data)
    })

    const summaryDiv=document.getElementById("summary")
    summaryDiv.innerHTML="<strong>Pitchers submitted:</strong><br>"

    data.pitchers.forEach(p=>{
      summaryDiv.innerHTML+=`${p.name} — ${p.pitches} pitches, ${p.restDays} rest days<br>`
    })

    document.getElementById("opponent").value=""
    document.getElementById("notes").value=""

    log=[]
    update()
    render()

  }catch(e){
    alert("Submit error "+e)
  }

  submitBtn.disabled=false
  submitBtn.innerHTML="Submit"
}

function showDashboard(){
  document.getElementById("form-section").style.display="none"
  document.getElementById("summary").style.display="none"

  const dash=document.getElementById("dashboard")
  dash.style.display="block"

  dash.innerHTML=`
    <button onclick="backToForm()">⬅ Back to Game Submission</button>

    <h3>Pitching Dashboard</h3>

    Select Team<br>
    <select id="dashTeam">
      <option value="">Select a team</option>
    </select>

    <div id="teamStatus" style="margin-top:15px;"></div>
    <div id="eligibleToday" style="margin-top:20px;"></div>
  `

  const sel=document.getElementById("dashTeam")

  Object.keys(roster).forEach(t=>{
    let o=document.createElement("option")
    o.value=t
    o.text=t
    sel.appendChild(o)
  })

  sel.onchange=()=>loadTeamStatus(sel.value)
}

function backToForm(){
  document.getElementById("dashboard").style.display="none"
  document.getElementById("form-section").style.display="block"
  document.getElementById("summary").style.display="block"
}

async function loadTeamStatus(team){
  if(!team) return

  try{
    const res=await fetch(API+"?team="+encodeURIComponent(team))
    const data=await res.json()

    const today=new Date()
    today.setHours(0,0,0,0)

    let statusHTML="<h3>Pitching Status</h3>"
    let eligibleHTML="<h3>Who Can Pitch Today</h3>"

    let anyEligible=false

    if(!Array.isArray(data) || data.length===0){
      statusHTML+="No pitching records found for this team."
      eligibleHTML+="No pitchers eligible today"
      document.getElementById("teamStatus").innerHTML=statusHTML
      document.getElementById("eligibleToday").innerHTML=eligibleHTML
      return
    }

    data.forEach(p=>{
      const eligibleDate=new Date(p.eligibleDate)
      eligibleDate.setHours(0,0,0,0)

      const eligible=eligibleDate <= today

      statusHTML += eligible
        ? `<div class="status-good">🟢 ${p.name} — Eligible today</div>`
        : `<div class="status-bad">🔴 ${p.name} — Next eligible ${eligibleDate.toLocaleDateString()}</div>`

      if(eligible){
        eligibleHTML += `<div class="status-good">🟢 ${p.name}</div>`
        anyEligible=true
      }
    })

    if(!anyEligible){
      eligibleHTML += "No pitchers eligible today"
    }

    document.getElementById("teamStatus").innerHTML=statusHTML
    document.getElementById("eligibleToday").innerHTML=eligibleHTML

  }catch(err){
    document.getElementById("teamStatus").innerHTML=`<div class="status-bad">Error loading dashboard: ${err}</div>`
    document.getElementById("eligibleToday").innerHTML=""
  }
}

load()

</script>
