<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Noblesville Travel Baseball Pitch Log</title>

  <style>
    :root{
      --black:#111111;
      --gold:#c9a227;
      --blue:#1e73be;
      --blue-dark:#155a96;
      --gray:#e9e9e9;
      --gray-text:#7a7a7a;
      --danger:#b42318;
    }

    *{
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      max-width:600px;
      margin:auto;
      padding:20px;
      color:var(--black);
      background:#ffffff;
    }

    .logo{
      width:120px;
      display:block;
      margin:0 auto 10px auto;
    }

    h1,h2,h3{
      text-align:center;
      margin:8px 0;
    }

    .section{
      margin-bottom:18px;
    }

    label{
      display:block;
      font-weight:bold;
      margin-bottom:6px;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:12px;
      font-size:16px;
      border:1px solid #cfcfcf;
      border-radius:8px;
      background:#fff;
    }

    textarea{
      resize:vertical;
      min-height:110px;
    }

    .btn,
    .player-btn,
    .entry-btn{
      display:block;
      width:100%;
      padding:12px;
      margin:8px 0;
      font-size:16px;
      font-weight:bold;
      text-align:center;
      text-decoration:none;
      border:none;
      border-radius:8px;
      cursor:pointer;
      transition:background .15s ease, opacity .15s ease, transform .05s ease;
    }

    .btn:active,
    .player-btn:active,
    .entry-btn:active{
      transform:scale(0.99);
    }

    .btn-primary{
      background:var(--black);
      color:#fff;
    }

    .btn-primary:hover{
      background:#000;
    }

    .btn-secondary{
      background:var(--blue);
      color:#fff;
    }

    .btn-secondary:hover{
      background:var(--blue-dark);
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
    }

    .btn-danger:hover{
      background:#8f1c13;
    }

    .btn-disabled,
    button:disabled{
      background:var(--gray) !important;
      color:var(--gray-text) !important;
      cursor:not-allowed !important;
      opacity:1 !important;
    }

    .player-grid{
      margin-top:8px;
    }

    .player-btn{
      background:var(--black);
      color:#fff;
    }

    .player-btn:hover{
      background:#000;
    }

    .muted{
      color:#666;
      font-size:14px;
      margin-top:4px;
    }

    .hidden{
      display:none;
    }

    .log-list{
      margin-top:10px;
    }

    .log-card{
      border:1px solid #d9d9d9;
      border-radius:8px;
      padding:12px;
      margin-bottom:10px;
      background:#fafafa;
    }

    .log-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }

    .log-name{
      font-weight:bold;
    }

    .log-pitches{
      font-size:15px;
    }

    .log-actions{
      display:flex;
      gap:8px;
      width:100%;
      margin-top:10px;
    }

    .log-actions .entry-btn{
      margin:0;
      width:100%;
      padding:10px;
      font-size:14px;
    }

    .empty-state{
      text-align:center;
      color:#666;
      padding:10px 0;
    }

    .status{
      text-align:center;
      margin-top:10px;
      font-size:14px;
      color:#444;
      min-height:20px;
    }
  </style>
</head>
<body>

  <img src="DC5hbQVQ.jpg" class="logo" alt="Noblesville Travel Baseball logo">

  <h1>Noblesville Travel Baseball</h1>
  <h2>Game Pitch Log</h2>

  <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>

  <div class="section">
    <label for="date">Date</label>
    <input type="date" id="date">
  </div>

  <div class="section">
    <label for="team">Team</label>
    <select id="team"></select>
  </div>

  <div class="section">
    <label for="opponent">Opponent</label>
    <input id="opponent" type="text" placeholder="Enter opponent name">
  </div>

  <div class="section" id="pitchersSection">
    <label>Pitchers</label>
    <div class="muted">Tap a player to enter pitch count.</div>
    <div id="pitchers" class="player-grid"></div>
  </div>

  <div class="section">
    <h3>Pitch Log</h3>
    <div id="log" class="log-list"></div>
  </div>

  <div class="section">
    <label for="notes">Game Notes</label>
    <textarea id="notes" placeholder="Enter game notes"></textarea>
    <div class="muted">Submit stays disabled until Game Notes are entered.</div>
  </div>

  <button id="submitBtn" class="btn btn-primary btn-disabled" onclick="submitGame()" disabled>Submit</button>

  <div id="status" class="status"></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbwdblCmYSuNrFK_Gk-pQIB4fOKncnpvQ24cgaCUfWcVtGXYieMs16O47MvAoja0FPfL/exec";

    let roster = {};
    let log = [];

    const teamEl = document.getElementById("team");
    const dateEl = document.getElementById("date");
    const opponentEl = document.getElementById("opponent");
    const notesEl = document.getElementById("notes");
    const submitBtn = document.getElementById("submitBtn");
    const pitchersDiv = document.getElementById("pitchers");
    const logDiv = document.getElementById("log");
    const pitchersSection = document.getElementById("pitchersSection");
    const statusEl = document.getElementById("status");

    async function load(){
      const res = await fetch("roster.json");
      roster = await res.json();

      teamEl.innerHTML = "";

      Object.keys(roster).forEach(teamName => {
        const opt = document.createElement("option");
        opt.value = teamName;
        opt.text = teamName;
        teamEl.appendChild(opt);
      });

      teamEl.addEventListener("change", onTeamChange);
      notesEl.addEventListener("input", updateSubmitState);

      setDefaultDate();
      onTeamChange();
      updateSubmitState();
    }

    function setDefaultDate(){
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, "0");
      const d = String(today.getDate()).padStart(2, "0");
      dateEl.value = `${y}-${m}-${d}`;
    }

    function onTeamChange(){
      log = [];
      renderLog();
      renderPlayers();
      updateSubmitState();
      statusEl.textContent = "";
    }

    function renderPlayers(){
      const team = teamEl.value;
      pitchersDiv.innerHTML = "";

      if(team.startsWith("7U")){
        pitchersSection.classList.add("hidden");
        return;
      }

      pitchersSection.classList.remove("hidden");

      (roster[team] || []).forEach(player => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "player-btn";
        btn.textContent = player;
        btn.onclick = () => upsertPitcher(player);
        pitchersDiv.appendChild(btn);
      });
    }

    function upsertPitcher(player){
      const existing = log.find(entry => entry.name === player);
      const currentValue = existing ? existing.pitches : "";
      const response = prompt(`Pitch count for ${player}`, currentValue);

      if(response === null) return;

      const trimmed = String(response).trim();

      if(trimmed === ""){
        return;
      }

      const pitches = Number(trimmed);

      if(Number.isNaN(pitches) || pitches < 0){
        alert("Please enter a valid pitch count.");
        return;
      }

      if(existing){
        existing.pitches = pitches;
      } else {
        log.push({ name: player, pitches });
      }

      renderLog();
      updateSubmitState();
    }

    function renderLog(){
      if(log.length === 0){
        logDiv.innerHTML = `<div class="empty-state">No pitchers entered yet.</div>`;
        return;
      }

      logDiv.innerHTML = "";

      log.forEach((entry, index) => {
        const card = document.createElement("div");
        card.className = "log-card";

        card.innerHTML = `
          <div class="log-row">
            <div class="log-name">${escapeHtml(entry.name)}</div>
            <div class="log-pitches">${entry.pitches} pitches</div>
          </div>
          <div class="log-actions">
            <button type="button" class="entry-btn btn-secondary" data-action="edit" data-index="${index}">Edit</button>
            <button type="button" class="entry-btn btn-danger" data-action="remove" data-index="${index}">Remove</button>
          </div>
        `;

        logDiv.appendChild(card);
      });

      logDiv.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          const index = Number(btn.dataset.index);
          const action = btn.dataset.action;

          if(action === "edit"){
            upsertPitcher(log[index].name);
          }

          if(action === "remove"){
            log.splice(index, 1);
            renderLog();
            updateSubmitState();
          }
        });
      });
    }

    function updateSubmitState(){
      const hasNotes = notesEl.value.trim().length > 0;
      submitBtn.disabled = !hasNotes;
      submitBtn.classList.toggle("btn-disabled", !hasNotes);
    }

    async function submitGame(){
      if(submitBtn.disabled){
        return;
      }

      const is7U = teamEl.value.startsWith("7U");

      if(!dateEl.value){
        alert("Please enter a date.");
        return;
      }

      if(!teamEl.value){
        alert("Please select a team.");
        return;
      }

      if(!opponentEl.value.trim()){
        alert("Please enter an opponent.");
        return;
      }

      if(!notesEl.value.trim()){
        alert("Please enter game notes.");
        return;
      }

      if(!is7U && log.length === 0){
        alert("Please enter at least one pitcher.");
        return;
      }

      const data = {
        date: dateEl.value,
        team: teamEl.value,
        opponent: opponentEl.value.trim(),
        notes: notesEl.value.trim(),
        pitchers: log
      };

      try{
        submitBtn.disabled = true;
        submitBtn.classList.add("btn-disabled");
        statusEl.textContent = "Submitting...";

        await fetch(API, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify(data)
        });

        alert("Game Submitted");

        opponentEl.value = "";
        notesEl.value = "";
        log = [];
        renderLog();
        updateSubmitState();
        statusEl.textContent = "Submitted.";
      } catch (err){
        console.error(err);
        statusEl.textContent = "Submission failed.";
        alert("Something went wrong while submitting.");
        updateSubmitState();
      }
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    load();
  </script>
</body>
</html>
