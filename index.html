<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Noblesville Travel Baseball Pitch Log</title>

<style>

body{
font-family:Arial;
max-width:600px;
margin:auto;
padding:20px;
}

.logo{
width:120px;
display:block;
margin:auto;
}

h1{
text-align:center;
}

button{
width:100%;
padding:12px;
margin:6px 0;
font-size:16px;
}

.player{
background:#000;
color:#fff;
}

</style>

</head>

<body>

<img src="DC5hbQVQ.jpg" class="logo">

<h1>Noblesville Travel Baseball</h1>

<h2>Game Pitch Log</h2>

Date<br>
<input type="date" id="date"><br><br>

Team<br>
<select id="team"></select><br><br>

Opponent<br>
<input id="opponent"><br><br>

<div id="pitchers"></div>

<h3>Pitch Log</h3>

<div id="log"></div>

Game Notes<br>

<textarea id="notes" rows="4" style="width:100%"></textarea>

<br><br>

<button onclick="submitGame()">Submit</button>

<script>

const API="https://script.google.com/macros/s/AKfycbwdblCmYSuNrFK_Gk-pQIB4fOKncnpvQ24cgaCUfWcVtGXYieMs16O47MvAoja0FPfL/exec";

let roster={}
let log=[]

async function load(){

const res=await fetch("roster.json")
roster=await res.json()

const team=document.getElementById("team")

Object.keys(roster).forEach(t=>{

let opt=document.createElement("option")
opt.value=t
opt.text=t

team.appendChild(opt)

})

team.onchange=render

render()

}

function render(){

const team=document.getElementById("team").value
const div=document.getElementById("pitchers")

div.innerHTML=""

if(team.startsWith("7U")) return

roster[team].forEach(p=>{

let btn=document.createElement("button")

btn.className="player"
btn.innerText=p

btn.onclick=()=>{

let pitches=prompt("Pitch count for "+p)

if(!pitches) return

log.push({name:p,pitches:Number(pitches)})

update()

}

div.appendChild(btn)

})

}

function update(){

const div=document.getElementById("log")

div.innerHTML=""

log.forEach(l=>{
div.innerHTML+=`${l.name} — ${l.pitches}<br>`
})

}

async function submitGame(){

  const data={
    date:document.getElementById("date").value,
    team:document.getElementById("team").value,
    opponent:document.getElementById("opponent").value,
    notes:document.getElementById("notes").value,
    pitchers:log
  }
console.log(data)
  
  await fetch(API,{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"text/plain"
    },
    body:JSON.stringify(data)
  })

  alert("Game Submitted")

  log=[]
  update()

}

load()

</script>

</body>
</html>
