<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Noblesville Travel Baseball</title>
<style>
body{font-family:Arial;max-width:600px;margin:auto;padding:20px;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
header img{width:80px;}
header h1{margin:0;font-size:20px;}
button{padding:10px;margin:4px 0;font-size:16px;cursor:pointer;}
.player{padding:6px 10px;margin:2px;background:#ddd;color:#000;border:none;border-radius:4px;display:flex;align-items:center;justify-content:space-between;}
.remove-btn{margin-left:8px;padding:2px 6px;font-size:12px;background:red;color:#fff;border:none;border-radius:3px;cursor:pointer;}
#log div{margin-bottom:4px;}
input, select, textarea{width:100%;padding:8px;margin:4px 0;border:1px solid #888;border-radius:4px;}
.spinner{display:none;margin-left:8px;}
</style>
</head>
<body>
<header>
<img src="DC5hbQVQ.jpg" class="logo">
<h1>Noblesville Travel Baseball</h1>
</header>

<h2>Game Pitch Log</h2>

Date<br>
<input type="date" id="date"><br>

Team<br>
<select id="team">
<option value="">--Select Team--</option>
</select><br>

Opponent<br>
<input id="opponent"><br>

<div id="pitchers"></div>

<h3>Pitch Log</h3>
<div id="log"></div>

Game Notes<br>
<textarea id="notes" rows="4"></textarea><br>

<button id="submitBtn" onclick="submitGame()">Submit<span class="spinner" id="spinner">⏳</span></button>

<hr>
<h2>Dashboard</h2>
Team<br>
<select id="dashTeam">
<option value="">--Select Team--</option>
</select><br>
<div id="dashboard"></div>
<button onclick="showForm()">Back to Submit</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbxQ4g4cDvXQw-dwr2WVD_LwuaUkwWK1k4LUW1marc7VAFYGufR-YDeMz_kVVr05wWC_/exec"; // replace with deployed Apps Script URL
let roster = {};
let log = [];

// Load roster.json and populate team dropdowns
async function loadRoster() {
  const res = await fetch("roster.json");
  roster = await res.json();
  const teamSel = document.getElementById("team");
  const dashSel = document.getElementById("dashTeam");
  Object.keys(roster).forEach(t=>{
    let opt = document.createElement("option");
    opt.value=t; opt.text=t;
    teamSel.appendChild(opt);
    dashSel.appendChild(opt.cloneNode(true));
  });
  document.getElementById("date").valueAsDate = new Date();
  renderPlayers();
}

function renderPlayers() {
  const team = document.getElementById("team").value;
  const div = document.getElementById("pitchers");
  div.innerHTML="";
  if(!team || team.startsWith("7U")) return;
  roster[team].forEach(p=>{
    const btn = document.createElement("button");
    btn.className="player";
    btn.innerHTML=`${p} <span class="check">✔</span>`;
    btn.querySelector(".check").style.display="none";
    const removeBtn = document.createElement("button");
    removeBtn.textContent="x";
    removeBtn.className="remove-btn";
    removeBtn.onclick=e=>{
      log = log.filter(l=>l.name!==p);
      updateLog(); e.stopPropagation();
      btn.querySelector(".check").style.display="none";
    };
    btn.appendChild(removeBtn);
    btn.onclick=async ()=>{
      let pitches = prompt("Pitch count for "+p,"");
      if(pitches===null) return;
      pitches = Number(pitches);
      if(isNaN(pitches)) { alert("Enter a number"); return;}
      const existing = log.find(l=>l.name===p);
      if(existing) existing.pitches = pitches;
      else log.push({name:p,pitches:pitches});
      btn.querySelector(".check").style.display="inline";
      updateLog();
    };
    div.appendChild(btn);
  });
}

function updateLog() {
  const div = document.getElementById("log");
  div.innerHTML="";
  log.forEach(l=>{ div.innerHTML+=`${l.name} — ${l.pitches}<br>`; });
}

async function submitGame() {
  const notes = document.getElementById("notes").value.trim();
  if(!notes){alert("Game Notes required"); return;}
  const data = {
    date: document.getElementById("date").value,
    team: document.getElementById("team").value,
    opponent: document.getElementById("opponent").value,
    notes: notes,
    pitchers: log
  };
  const btn = document.getElementById("submitBtn");
  document.getElementById("spinner").style.display="inline";
  try {
    const res = await fetch(API, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(data),
      mode:"cors"
    });
    const result = await res.json();
    alert("Game submitted!\nPitchers:\n"+result.pitchers.map(p=>`${p.name} — Rest Days: ${p.restDays}, Eligible: ${p.eligibleDate}`).join("\n"));
    log=[]; updateLog();
    document.getElementById("opponent").value="";
    document.getElementById("notes").value="";
    renderPlayers();
  } catch(e){ alert("Submit failed: "+e); }
  finally { document.getElementById("spinner").style.display="none"; }
}

// Dashboard
async function loadDashboard() {
  const team = document.getElementById("dashTeam").value;
  if(!team) return;
  const url = `${API}?team=${encodeURIComponent(team)}`;
  try {
    const res = await fetch(url, { mode:"cors" });
    const data = await res.json();
    renderDashboard(data);
  } catch(e){ document.getElementById("dashboard").innerHTML="Error loading team: "+e; }
}

function renderDashboard(rows) {
  const div = document.getElementById("dashboard");
  div.innerHTML="";
  if(rows.length===0) { div.innerHTML="No data"; return; }
  rows.forEach(r=>{
    const row = document.createElement("div");
    row.textContent=`${r.name} — Eligible: ${r.eligible? "Yes":"No"} — Rest days remaining: ${r.restRemaining} — Eligible on: ${r.eligibleDate}`;
    div.appendChild(row);
  });
}

function showForm(){
  document.getElementById("dashboard").innerHTML="";
  document.getElementById("dashTeam").value="";
}

document.getElementById("team").addEventListener("change", renderPlayers);
document.getElementById("dashTeam").addEventListener("change", loadDashboard);

loadRoster();
</script>
</body>
</html>
