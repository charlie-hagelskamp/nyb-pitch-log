<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Noblesville Travel Baseball Pitch Log</title>
<style>
body{
  font-family:Arial;
  max-width:600px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  align-items:center;
  margin-bottom:20px;
}

.header img.logo{
  width:80px;
  margin-right:15px;
}

.header h1{
  font-size:1.5em;
  margin:0;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin:6px 0 12px 0;
  font-size:16px;
  border:1.5px solid #555; /* darker outline */
  border-radius:4px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
  cursor:pointer;
}

.player{
  background:#ccc; /* lighter background */
  color:#000; /* black font */
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.player.added{
  background:#a6e3a1; /* light green for added */
}

.checkmark{
  font-weight:bold;
  margin-left:8px;
}

.log-remove-btn{
  font-size:14px;
  margin-left:8px;
}
</style>
</head>
<body>

<div class="header">
  <img src="DC5hbQVQ.jpg" class="logo">
  <h1>Noblesville Travel Baseball</h1>
</div>

<h2>Game Pitch Log</h2>

Date<br>
<input type="date" id="date"><br>

Team<br>
<select id="team">
  <option value="">Select a team</option>
</select><br>

Opponent<br>
<input id="opponent"><br>

<div id="pitchers"></div>

<h3>Pitch Log</h3>
<div id="log"></div>

Game Notes<br>
<textarea id="notes" rows="4" style="width:100%"></textarea>
<br>

<button onclick="submitGame()">Submit</button>

<script>
const API="https://script.google.com/macros/s/AKfycbwdblCmYSuNrFK_Gk-pQIB4fOKncnpvQ24cgaCUfWcVtGXYieMs16O47MvAoja0FPfL/exec";

let roster={}
let log=[]

async function load(){
  const res=await fetch("roster.json")
  roster=await res.json()

  const teamSelect=document.getElementById("team")

  Object.keys(roster).forEach(t=>{
    let opt=document.createElement("option")
    opt.value=t
    opt.text=t
    teamSelect.appendChild(opt)
  })

  teamSelect.onchange=render
  render()
}

function render(){
  const team=document.getElementById("team").value
  const div=document.getElementById("pitchers")
  div.innerHTML=""

  if(!team || team.startsWith("7U")) return

  roster[team].forEach(p=>{
    let btn=document.createElement("button")
    btn.className="player"
    btn.innerHTML=p + '<span class="checkmark"></span>'
    btn.onclick=()=>addOrRemovePitcher(p, btn)
    div.appendChild(btn)
  })
}

function addOrRemovePitcher(name, btn){
  // If already in log, remove
  const index = log.findIndex(l=>l.name===name)
  if(index >= 0){
    log.splice(index,1)
    btn.classList.remove("added")
    btn.querySelector(".checkmark").innerText=""
    update()
    return
  }

  // Use input type=number to trigger number keypad on mobile
  let pitches = promptNumber("Pitch count for "+name)
  if(pitches === null) return

  log.push({name, pitches})
  btn.classList.add("added")
  btn.querySelector(".checkmark").innerText="✔"
  update()
}

function promptNumber(message){
  const input = window.prompt(message,"0")
  if(input === null) return null
  const num = Number(input)
  if(isNaN(num) || num<0) return null
  return num
}

function update(){
  const div=document.getElementById("log")
  div.innerHTML=""

  log.forEach(l=>{
    div.innerHTML += `${l.name} — ${l.pitches} <button class="log-remove-btn" onclick="removeFromLog('${l.name}')">Remove</button><br>`
  })
}

function removeFromLog(name){
  const index = log.findIndex(l=>l.name===name)
  if(index>=0){
    log.splice(index,1)
    document.querySelectorAll(".player").forEach(btn=>{
      if(btn.innerText.includes(name)){
        btn.classList.remove("added")
        btn.querySelector(".checkmark").innerText=""
      }
    })
    update()
  }
}

async function submitGame(){
  const notes = document.getElementById("notes").value.trim()
  if(!notes){
    alert("Please enter Game Notes before submitting.")
    return
  }

  const data={
    date:document.getElementById("date").value,
    team:document.getElementById("team").value,
    opponent:document.getElementById("opponent").value,
    notes:notes,
    pitchers:log
  }

  console.log(data)

  await fetch(API,{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"text/plain"
    },
    body:JSON.stringify(data)
  })

  alert("Game Submitted")

  // Clear fields after submit
  document.getElementById("opponent").value=""
  document.getElementById("notes").value=""
  log=[]
  update()
  render()
}

load()
</script>

</body>
</html>
